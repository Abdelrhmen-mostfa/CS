<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - رحلة المهارات الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-md">
        <div class="text-8xl mb-6">📡</div>
        <h1 class="text-3xl font-black text-gray-800 mb-4">أنت غير متصل بالإنترنت</h1>
        <p class="text-gray-600 mb-8 leading-relaxed">
            لا تقلق! لا يزال بإمكانك استخدام التطبيق ومتابعة تعلمك. 
            سيتم حفظ تقدمك محلياً ومزامنته عند العودة للاتصال.
        </p>
        <button onclick="window.location.reload()" 
                class="bg-gradient-to-r from-primary to-secondary text-white px-8 py-4 rounded-full font-bold text-lg hover:shadow-xl transition transform hover:scale-105 inline-flex items-center gap-2">
            <span>🔄</span>
            <span>إعادة المحاولة</span>
        </button>
        <div class="mt-8 bg-white rounded-2xl p-6 shadow-lg">
            <h2 class="font-bold text-gray-800 mb-4">💡 نصيحة:</h2>
            <p class="text-gray-600 text-sm">
                يمكنك تثبيت هذا التطبيق على جهازك للاستخدام دون الحاجة للإنترنت في أي وقت!
            </p>
        </div>
    </div>
</body>
</html>
